<script>
    document.addEventListener("DOMContentLoaded", function() {
        var textLogo = document.getElementById("text-logo");
        var iconLogo = document.getElementById("icon-logo")
        var logo = document.getElementById("logo")

        logo.addEventListener("mouseover", function() {
            textLogo.src = "images/text-logo2.png";
            iconLogo.src = "images/logo2.png"
        });

        textLogo.addEventListener("mouseout", function() {
            textLogo.src = "images/text-logo.png";
            iconLogo.src = "images/logo.png";
        });
    });
</script>
